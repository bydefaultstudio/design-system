  <!-- GoTrue JS — Netlify Identity API client (skipped on localhost) -->
  <script>
    window._gotrueReady = (function() {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0') {
        return Promise.resolve(null);
      }
      return import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm')
        .then(function(m) { var G = m.default && m.default.default ? m.default.default : m.default; window.GoTrue = G; return G; })
        .catch(function(e) { console.error('[Auth] GoTrue load failed:', e); return null; });
    })();
  </script>
</head>

      <h1 class="login-title" id="login-title">Welcome to BrandOS</h1>
      <p class="login-subtitle" id="login-subtitle">Sign in to access your dashboard</p>

      <!-- Login Form -->
      <form class="login-form" id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" autocomplete="username" required aria-required="true" aria-describedby="login-error" placeholder="you@company.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-field">
            <input type="password" id="login-password" name="password" autocomplete="current-password" required aria-required="true" aria-describedby="login-error" placeholder="Enter your password">
            <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <div class="icn-svg" data-icon="eye">
                <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true"><path d="M12 5C5.63636 5 2 12 2 12C2 12 5.63636 19 12 19C18.3636 19 22 12 22 12C22 12 18.3636 5 12 5ZM12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16Z" fill="currentColor"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="login-error" id="login-error" role="alert" aria-live="assertive"></div>
        <div class="login-success" id="login-success" role="status" aria-live="polite"></div>
        <button type="submit" class="button login-submit-btn">Log in</button>
      </form>

      <!-- Forgot Password Toggle -->
      <button type="button" class="login-forgot-btn" id="login-forgot-btn">Forgot password?</button>

      <!-- Reset Password Form (send recovery email) -->
      <div class="login-reset-form is-hidden" id="login-reset-form">
        <div class="form-group">
          <label for="reset-email">Email</label>
          <input type="email" id="reset-email" name="reset-email" autocomplete="username" required aria-required="true" aria-describedby="reset-error" placeholder="you@company.com">
        </div>
        <div class="login-error" id="reset-error" role="alert" aria-live="assertive"></div>
        <div class="login-success" id="reset-success" role="status" aria-live="polite"></div>
        <button type="button" class="button login-submit-btn" id="reset-submit-btn">Send reset link</button>
        <button type="button" class="login-forgot-btn" id="reset-back-btn">Back to login</button>
      </div>

      <!-- Set Password Form (for invite/recovery tokens) -->
      <div class="login-set-password-form is-hidden" id="login-set-password-form">
        <div class="form-group is-hidden" id="set-password-name-group">
          <label for="set-password-name">Full name</label>
          <input type="text" id="set-password-name" name="full-name" autocomplete="name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label for="set-password-new">New password</label>
          <div class="password-field">
            <input type="password" id="set-password-new" name="new-password" autocomplete="new-password" required aria-required="true" aria-describedby="set-password-error" placeholder="Enter new password" minlength="8">
            <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <div class="icn-svg" data-icon="eye">
                <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true"><path d="M12 5C5.63636 5 2 12 2 12C2 12 5.63636 19 12 19C18.3636 19 22 12 22 12C22 12 18.3636 5 12 5ZM12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16Z" fill="currentColor"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="set-password-confirm">Confirm password</label>
          <div class="password-field">
            <input type="password" id="set-password-confirm" name="confirm-password" autocomplete="new-password" required aria-required="true" aria-describedby="set-password-error" placeholder="Confirm new password" minlength="8">
            <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <div class="icn-svg" data-icon="eye">
                <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true"><path d="M12 5C5.63636 5 2 12 2 12C2 12 5.63636 19 12 19C18.3636 19 22 12 22 12C22 12 18.3636 5 12 5ZM12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16Z" fill="currentColor"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="login-error" id="set-password-error" role="alert" aria-live="assertive"></div>
        <div class="login-success" id="set-password-success" role="status" aria-live="polite"></div>
        <button type="button" class="button login-submit-btn" id="set-password-submit-btn">Set password</button>
        <button type="button" class="login-forgot-btn" id="set-password-back-btn">Back to login</button>
      </div>
    </div>
