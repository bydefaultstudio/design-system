<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - By Default Brand OS</title>
  <meta name="description" content="Manage your account settings.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">

  <!-- Robots -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Design System Framework -->
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <!-- Site styles -->
  <!-- Docs-site components (sticky-bar, copy-btn, etc.) -->
  <link rel="stylesheet" href="../assets/css/docs-site.css">

  <!-- Adobe Typekit (trust-3a secondary font) -->
  <link rel="stylesheet" href="https://use.typekit.net/wgr3lwl.css">
  <!-- Preload primary variable font -->
  <link rel="preload" href="../assets/fonts/zalando-sans/ZalandoSans-VariableFont_wdth,wght.ttf" as="font" type="font/ttf" crossorigin>

  <!-- GoTrue JS — Netlify Identity API client (skipped on localhost) -->
  <script>
    window._gotrueReady = (function() {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0') {
        return Promise.resolve(null);
      }
      return import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm')
        .then(function(m) { var G = m.default && m.default.default ? m.default.default : m.default; window.GoTrue = G; return G; })
        .catch(function(e) { console.error('[Auth] GoTrue load failed:', e); return null; });
    })();
  </script>
</head>

<body data-access="public" data-page="account">

  <!-- Site Navigation (header injected by nav.js, no sidebar) -->
  <div id="site-nav" data-base="../" data-sidebar="false"></div>

  <div class="login-page">
    <div class="login-card">
      <h1 class="login-title">Account</h1>
      <p class="login-subtitle" id="account-subtitle">Manage your profile and password</p>

      <!-- Account Info (read-only) -->
      <div class="account-section" id="account-info">
        <div class="form-group">
          <label for="account-email">Email</label>
          <input type="email" id="account-email" disabled aria-disabled="true">
        </div>
        <div class="form-group">
          <label for="account-role">Role</label>
          <input type="text" id="account-role" disabled aria-disabled="true">
        </div>
      </div>

      <!-- Profile Section -->
      <div class="account-section" id="account-profile">
        <div class="form-group">
          <label for="account-name">Full name</label>
          <input type="text" id="account-name" name="full-name" autocomplete="name" aria-describedby="account-profile-error" placeholder="Your full name">
        </div>
        <div class="login-error" id="account-profile-error" role="alert" aria-live="assertive"></div>
        <div class="login-success" id="account-profile-success" role="status" aria-live="polite"></div>
        <button type="button" class="button login-submit-btn" id="account-profile-save">Save name</button>
      </div>

      <!-- Change Password Section -->
      <div class="account-section" id="account-password">
        <div class="form-group">
          <label for="account-new-password">New password</label>
          <div class="password-field">
            <input type="password" id="account-new-password" name="new-password" autocomplete="new-password" aria-required="true" aria-describedby="account-password-error" placeholder="Enter new password" minlength="8">
            <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <div class="svg-icn" data-icon="eye">
                <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true"><path d="M12 5C5.63636 5 2 12 2 12C2 12 5.63636 19 12 19C18.3636 19 22 12 22 12C22 12 18.3636 5 12 5ZM12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16Z" fill="currentColor"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="account-confirm-password">Confirm password</label>
          <div class="password-field">
            <input type="password" id="account-confirm-password" name="confirm-password" autocomplete="new-password" aria-required="true" aria-describedby="account-password-error" placeholder="Confirm new password" minlength="8">
            <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <div class="svg-icn" data-icon="eye">
                <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true"><path d="M12 5C5.63636 5 2 12 2 12C2 12 5.63636 19 12 19C18.3636 19 22 12 22 12C22 12 18.3636 5 12 5ZM12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16Z" fill="currentColor"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="login-error" id="account-password-error" role="alert" aria-live="assertive"></div>
        <div class="login-success" id="account-password-success" role="status" aria-live="polite"></div>
        <button type="button" class="button login-submit-btn" id="account-password-save">Update password</button>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <script src="../assets/js/nav.js"></script>
  <!-- Dropdown (required for auth role switcher) -->
  <script src="../assets/js/dropdown.js"></script>

  <!-- Auth -->
  <script src="../assets/js/auth-config.js"></script>
  <script src="../assets/js/theme-config.js"></script>
  <script src="../assets/js/theme-loader.js"></script>
  <script src="../assets/js/auth.js"></script>
  <!-- Password toggle -->
  <script src="../assets/js/password-toggle.js"></script>

</body>

</html>
