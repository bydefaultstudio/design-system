<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Essential -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPM Calculator</title>
  <meta name="description" content="A web-based campaign impression planner and pricing calculator for media planners and sales teams." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">

  <!-- Open Graph -->
  <meta property="og:title" content="CPM Calculator - By Default Brand OS">
  <meta property="og:description" content="A web-based campaign impression planner and pricing calculator for media planners and sales teams.">
  <meta property="og:image" content="../assets/images/og-default.jpg">
  <meta property="og:type" content="website">

  <!-- Robots -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Brand Book -->
  <link rel="stylesheet" href="../brand-book/brand-book.css" />
  <!-- Design System Framework -->
  <link rel="stylesheet" href="../design-system/design-system.css" />
  <!-- Calculator Styles -->
  <link rel="stylesheet" href="../assets/css/calculator.css" />
  <!-- Site styles (auth UI) -->
  <link rel="stylesheet" href="../assets/css/style.css" />

  <!-- GoTrue JS (skipped on localhost) -->
  <script>
    if (!(window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0')) {
      document.write('<script src="https://unpkg.com/gotrue-js@0.9.29/dist/goTrue.umd.js"><\/script>');
    }
  </script>

  <!-- Google Fonts: Inclusive Sans (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="auth-loading" data-access="client">

  <!-- Site Navigation (header + sidebar injected by nav.js) -->
  <div id="site-nav" data-base="../"></div>

  <div class="page-wrapper has-sidebar">
    <div class="page-content">

      <!-- Header -->
      <section class="top-medium bottom-medium border-bottom border-secondary">
        <div class="padding-global">
          <div class="container-medium">
            <div class="block gap-s">
              <p class="eyebrow">Tools</p>
              <h1>CPM & Spend Calculator</h1>
              <p class="text-size-small" data-text-wrap="pretty">Campaign impression planner and pricing calculator for media planners and sales teams.</p>
              <p class="text-size-small"><a href="../calculator.html">How to use this tool</a></p>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 1: Global Inputs -->
      <section class="top-medium bottom-medium">
        <div class="padding-global">
          <div class="container-medium">
            <div class="block gap-l padding-2xl border border-faded">
              <h2 class="eyebrow" style="margin:0;">Global Settings</h2>

              <div class="calculator-toggle-group">
                <div class="calculator-toggle">
                  <input type="checkbox" id="opt-af" class="sr-only">
                  <label for="opt-af" class="calculator-toggle-btn">
                    <div class="icn-svg calculator-toggle-icon" data-icon="check">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9.54998 18L3.84998 12.3L5.27498 10.875L8.13576 13.7358C8.91681 14.5168 10.1831 14.5168 10.9642 13.7358L18.725 5.97501L20.15 7.40001L9.54998 18Z" fill="currentColor"/>
                      </svg>
                    </div>
                    By Default Fee
                  </label>
                </div>
                <div class="calculator-toggle">
                  <input type="checkbox" id="opt-ah" class="sr-only">
                  <label for="opt-ah" class="calculator-toggle-btn">
                    <div class="icn-svg calculator-toggle-icon" data-icon="check">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9.54998 18L3.84998 12.3L5.27498 10.875L8.13576 13.7358C8.91681 14.5168 10.1831 14.5168 10.9642 13.7358L18.725 5.97501L20.15 7.40001L9.54998 18Z" fill="currentColor"/>
                      </svg>
                    </div>
                    Ad Hosting Fee
                  </label>
                </div>
                <div class="calculator-toggle">
                  <input type="checkbox" id="opt-pf" class="sr-only">
                  <label for="opt-pf" class="calculator-toggle-btn">
                    <div class="icn-svg calculator-toggle-icon" data-icon="check">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9.54998 18L3.84998 12.3L5.27498 10.875L8.13576 13.7358C8.91681 14.5168 10.1831 14.5168 10.9642 13.7358L18.725 5.97501L20.15 7.40001L9.54998 18Z" fill="currentColor"/>
                      </svg>
                    </div>
                    Add Partner
                  </label>
                </div>
              </div>

              <div class="block gap-m">
                <div class="block gap-s" data-opt="af">
                  <label for="agency-fee-cpm">
                    <strong>By Default Fee (CPM, £)</strong>
                  </label>
                  <input
                    type="number"
                    id="agency-fee-cpm"
                    name="agency-fee-cpm"
                    min="0"
                    value="1"
                  />
                </div>

                <div class="block gap-s" data-opt="ah">
                  <label for="ad-hosting-fee-cpm">
                    <strong>Ad Hosting Fee (CPM, £)</strong>
                  </label>
                  <input
                    type="number"
                    id="ad-hosting-fee-cpm"
                    name="ad-hosting-fee-cpm"
                    min="0"
                    value="1"
                  />
                </div>

                <div class="block gap-s" data-opt="pf">
                  <label for="partner-name">
                    <strong>Partner Name</strong>
                  </label>
                  <input
                    type="text"
                    id="partner-name"
                    name="partner-name"
                    placeholder="e.g. Vouge"
                    value=""
                  />
                </div>

                <div class="block gap-s" data-opt="pf">
                  <label for="publisher-payout">
                    <strong>Partner Share (%)</strong>
                  </label>
                  <input
                    type="number"
                    id="publisher-payout"
                    name="publisher-payout"
                    min="0"
                    max="100"
                    value="70"
                  />
                </div>

                <div class="block gap-s" data-opt="pf">
                  <label for="partner-margin-payout">
                    <strong>Net (%)</strong>
                  </label>
                  <input
                    type="number"
                    id="partner-margin-payout"
                    name="partner-margin-payout"
                    min="0"
                    max="100"
                    value="30"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 2: Campaign Inputs -->
      <section class="bottom-medium">
        <div class="padding-global">
          <div class="container-medium">
            <div class="block gap-l">
              <h2>Campaign Overview</h2>

              <div class="block gap-m">
                <div class="block gap-s">
                  <label for="campaign-cpm">
                    <strong>Campaign CPM (£)</strong>
                  </label>
                  <input
                    type="number"
                    id="campaign-cpm"
                    name="campaign-cpm"
                    min="0"
                    value="15"
                  />
                </div>

                <div class="block gap-s">
                  <label for="total-campaign-spend">
                    <strong>Total campaign spend (£)</strong>
                  </label>
                  <input
                    type="number"
                    id="total-campaign-spend"
                    name="total-campaign-spend"
                    min="0"
                    value="300000"
                  />
                </div>

                <div class="block gap-s">
                  <label for="calculated-impressions">
                    <strong>Calculated impressions</strong>
                  </label>
                  <input
                    type="text"
                    id="calculated-impressions"
                    name="calculated-impressions"
                    readonly
                    class="calculator-output"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 3: Monthly Breakdown Table -->
      <section class="bottom-large">
        <div class="padding-global">
          <div class="container-medium">
            <div class="block gap-l">
              <h2>Monthly Breakdown</h2>

              <div class="table-scroll">
                <table class="table table-full table-hover table-header-filled calculator-table">
                  <thead>
                    <tr>
                      <th>Month</th>
                      <th>Campaign (£)</th>
                      <th>Impressions</th>
                      <th data-opt="af">By Default</th>
                      <th data-opt="ah">Ad Hosting</th>
                      <th data-opt="pf" id="partner-share-header">Partner</th>
                      <th>Net</th>
                    </tr>
                  </thead>
                  <tbody id="monthly-table-body">
                    <!-- Rows will be generated by JavaScript -->
                  </tbody>
                  <tfoot>
                    <tr class="calculator-totals-row">
                      <th>Total</th>
                      <td id="total-spend">£0.00</td>
                      <td id="total-impressions">0</td>
                      <td data-opt="af" id="total-agency-earnings">£0.00</td>
                      <td data-opt="ah" id="total-ad-hosting-cost">£0.00</td>
                      <td data-opt="pf" id="total-publisher-payout">£0.00</td>
                      <td id="total-partner-margin">£0.00</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script src="../assets/js/calculator.js"></script>

  <!-- Back to Top -->
  <div class="back-to-top-wrapper">
    <button class="button is-faded is-icon back-to-top-btn" aria-label="Back to top" type="button">
      <div class="icn-svg"><svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 4V2H20V4H4Z" fill="currentColor"/>
        <path d="M11 22V12.2392C11 11.3483 9.92286 10.9021 9.29289 11.5321L5.4 15.425L4 14L12 6L20 14L18.6 15.425L14.7071 11.5321C14.0771 10.9021 13 11.3483 13 12.2392V22H11Z" fill="currentColor"/>
      </svg></div>
    </button>
  </div>
  <script>
    (function() {
      var btn = document.querySelector('.back-to-top-wrapper');
      if (!btn) return;
      window.addEventListener('scroll', function() {
        btn.classList.toggle('is-visible', window.scrollY > 300);
      });
      btn.querySelector('button').addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>
  <script>
    /* Table scroll overflow hint */
    (function initTableScroll() {
      var wrappers = document.querySelectorAll('.table-scroll');
      if (!wrappers.length) return;

      function checkOverflow(wrapper) {
        var isOverflowing = wrapper.scrollWidth > wrapper.clientWidth;
        var isAtEnd = wrapper.scrollLeft + wrapper.clientWidth >= wrapper.scrollWidth - 1;
        wrapper.classList.toggle('is-overflowing', isOverflowing);
        wrapper.classList.toggle('is-scrolled-end', isAtEnd);
      }

      wrappers.forEach(function(wrapper) {
        checkOverflow(wrapper);
        wrapper.addEventListener('scroll', function() { checkOverflow(wrapper); });
      });

      window.addEventListener('resize', function() {
        wrappers.forEach(checkOverflow);
      });
    })();
  </script>

  <!-- Site Navigation -->
  <script src="../assets/js/nav.js"></script>
  <!-- Auth -->
  <script src="../assets/js/auth-config.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>

</html>
