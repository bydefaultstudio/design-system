    <!-- GoTrue JS — Netlify Identity API client (skipped on localhost) -->
    <script>
      window._gotrueReady = (function() {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0') {
          return Promise.resolve(null);
        }
        return import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm')
          .then(function(m) { var G = m.default && m.default.default ? m.default.default : m.default; window.GoTrue = G; return G; })
          .catch(function(e) { console.error('[Auth] GoTrue load failed:', e); return null; });
      })();

    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Initialize Highlight.js, Copy, and TOC -->
    <script>
        (function() {
            'use strict';

            function initHighlight() {
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return Promise.resolve();
            }

            var copyIconPath = 'M8 14C8 15.1046 8.89543 16 10 16H18C19.1046 16 20 15.1046 20 14V6C20 4.89543 19.1046 4 18 4H10C8.89543 4 8 4.89543 8 6V14ZM6 18V2H22V18H6ZM2 22V6H4V20H18V22H2Z';
            var checkIconPath = 'M9.54998 18L3.84998 12.3L5.27498 10.875L8.13576 13.7358C8.91681 14.5168 10.1831 14.5168 10.9642 13.7358L18.725 5.97501L20.15 7.40001L9.54998 18Z';

            function initClipboard() {
                const buttons = document.querySelectorAll('.copy-code-btn');

                buttons.forEach(button => {
                    button.addEventListener('click', function() {
                        const targetId = this.getAttribute('data-clipboard-target');
                        const codeElement = document.querySelector(targetId);

                        if (codeElement) {
                            const text = codeElement.textContent;
                            const textSpan = this.querySelector('.copy-text');
                            const btnPath = this.querySelector('path');

                            copyToClipboard(text).then(() => {
                                if (btnPath) {
                                    btnPath.setAttribute('d', checkIconPath);
                                }
                                if (textSpan) {
                                    textSpan.textContent = 'Copied!';
                                }
                                setTimeout(() => {
                                    if (btnPath) {
                                        btnPath.setAttribute('d', copyIconPath);
                                    }
                                    if (textSpan) {
                                        textSpan.textContent = 'Copy';
                                    }
                                }, 1500);
                            });
                        }
                    });
                });
            }

            function initTOCActiveState() {
                const tocLinks = document.querySelectorAll('.toc-link');
                const headings = document.querySelectorAll('h1[id], h2[id]');

                if (tocLinks.length === 0 || headings.length === 0) return;

                const linkMap = new Map();
                tocLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && href.startsWith('#')) {
                        const id = href.substring(1);
                        linkMap.set(id, link);
                    }
                });

                const observerOptions = {
                    rootMargin: '-20% 0px -70% 0px',
                    threshold: 0
                };

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const id = entry.target.id;
                        const link = linkMap.get(id);

                        if (entry.isIntersecting) {
                            tocLinks.forEach(l => l.classList.remove('toc-link-active'));
                            if (link) {
                                link.classList.add('toc-link-active');
                            }
                        }
                    });
                }, observerOptions);

                headings.forEach(heading => {
                    if (heading.id) {
                        observer.observe(heading);
                    }
                });

                function setInitialActive() {
                    let activeHeading = null;
                    let maxTop = -Infinity;

                    headings.forEach(heading => {
                        const rect = heading.getBoundingClientRect();
                        if (rect.top <= 100 && rect.top > maxTop) {
                            maxTop = rect.top;
                            activeHeading = heading;
                        }
                    });

                    if (activeHeading && activeHeading.id) {
                        const link = linkMap.get(activeHeading.id);
                        if (link) {
                            tocLinks.forEach(l => l.classList.remove('toc-link-active'));
                            link.classList.add('toc-link-active');
                        }
                    }
                }

                setInitialActive();

                let scrollTimeout;
                window.addEventListener('scroll', () => {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(setInitialActive, 100);
                });
            }

            function init() {
                initHighlight();
                initClipboard();
                initTOCActiveState();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

    <!-- Back to Top -->
    <div class="back-to-top-wrapper">
      <button class="button is-faded is-icon back-to-top-btn" aria-label="Back to top" type="button">
        <div class="icn-svg"><svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 4V2H20V4H4Z" fill="currentColor"/>
          <path d="M11 22V12.2392C11 11.3483 9.92286 10.9021 9.29289 11.5321L5.4 15.425L4 14L12 6L20 14L18.6 15.425L14.7071 11.5321C14.0771 10.9021 13 11.3483 13 12.2392V22H11Z" fill="currentColor"/>
        </svg></div>
      </button>
    </div>
    <script>
      (function() {
        var btn = document.querySelector('.back-to-top-wrapper');
        if (!btn) return;
        window.addEventListener('scroll', function() {
          btn.classList.toggle('is-visible', window.scrollY > 300);
        });
        btn.querySelector('button').addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      })();
    </script>

    <!-- Sub-bar dropdown toggle -->
    <script>
      (function() {
        var dropdowns = document.querySelectorAll('.subbar-dropdown');
        dropdowns.forEach(function(dd) {
          var toggle = dd.querySelector(':scope > .header-link');
          if (!toggle) return;

          toggle.addEventListener('click', function() {
            var wasOpen = dd.classList.contains('is-open');
            dropdowns.forEach(function(d) {
              d.classList.remove('is-open');
              var t = d.querySelector(':scope > .header-link');
              if (t) t.setAttribute('aria-expanded', 'false');
            });
            if (!wasOpen) {
              dd.classList.add('is-open');
              toggle.setAttribute('aria-expanded', 'true');
            }
          });

          document.addEventListener('click', function(e) {
            if (!dd.contains(e.target)) {
              dd.classList.remove('is-open');
              toggle.setAttribute('aria-expanded', 'false');
            }
          });

          document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && dd.classList.contains('is-open')) {
              dd.classList.remove('is-open');
              toggle.setAttribute('aria-expanded', 'false');
              toggle.focus();
            }
          });
        });
      })();
    </script>

    <script>
      /* Table scroll overflow hint */
      (function initTableScroll() {
        var wrappers = document.querySelectorAll('.table-scroll');
        if (!wrappers.length) return;

        function checkOverflow(wrapper) {
          var isOverflowing = wrapper.scrollWidth > wrapper.clientWidth;
          var isAtEnd = wrapper.scrollLeft + wrapper.clientWidth >= wrapper.scrollWidth - 1;
          wrapper.classList.toggle('is-overflowing', isOverflowing);
          wrapper.classList.toggle('is-scrolled-end', isAtEnd);
        }

        wrappers.forEach(function(wrapper) {
          checkOverflow(wrapper);
          wrapper.addEventListener('scroll', function() { checkOverflow(wrapper); });
        });

        window.addEventListener('resize', function() {
          wrappers.forEach(checkOverflow);
        });
      })();
    </script>
