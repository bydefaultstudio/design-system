<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact us — By Default Brand OS</title>
  <meta name="description" content="Get in touch with the By Default team for access requests, support, or general enquiries.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">

  <!-- Robots -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Design System Framework -->
  <link rel="stylesheet" href="assets/css/design-system.css">
  <!-- Site styles -->
  <link rel="stylesheet" href="assets/css/docs-site.css">

  <!-- GoTrue JS (skipped on localhost) -->
  <script>
    window._gotrueReady = (function() {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0') {
        return Promise.resolve(null);
      }
      return import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm')
        .then(function(m) { var G = m.default && m.default.default ? m.default.default : m.default; window.GoTrue = G; return G; })
        .catch(function(e) { console.error('[Auth] GoTrue load failed:', e); return null; });
    })();
  </script>
</head>

<body data-access="public">

  <!-- Site Navigation (header only, no sidebar) -->
  <div id="site-nav" data-base="" data-sidebar="false"></div>

  <div class="page-wrapper has-sidebar">
    <div class="page-content">
      <section>
        <div class="padding-global">
          <div class="container-small">
            <div class="block gap-l">

              <div class="block gap-s">
                <h1 data-text-wrap="balance">Contact us</h1>
                <p>Request access, report an issue, or ask a question. We'll get back to you as soon as we can.</p>
              </div>

              <div class="access-support-form"></div>

            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- Site Navigation -->
  <script src="assets/js/nav.js"></script>
  <!-- Dropdown (required for auth role switcher) -->
  <script src="assets/js/dropdown.js"></script>
  <!-- Auth -->
  <script src="assets/js/auth-config.js"></script>
  <script src="assets/js/theme-config.js"></script>
  <script src="assets/js/theme-loader.js"></script>
  <script src="assets/js/auth.js"></script>
  <!-- Access & Support Form -->
  <script src="assets/js/access-support-form.js"></script>
</body>

</html>
