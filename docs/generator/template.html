<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}} - By Default Brand OS</title>
    <meta name="description" content="{{META_DESCRIPTION}}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{NAV_BASE}}assets/icons/favicon.svg">
    <link rel="icon" type="image/x-icon" href="{{NAV_BASE}}assets/icons/favicon.ico">

    <!-- Open Graph -->
    <meta property="og:title" content="{{PAGE_TITLE}} - By Default Brand OS">
    <meta property="og:description" content="{{META_DESCRIPTION}}">
    <meta property="og:image" content="{{NAV_BASE}}assets/images/og-default.jpg">
    <meta property="og:type" content="website">

    <!-- Design System Framework (path set in docs/docs.config.js) -->
    <link rel="stylesheet" href="{{DESIGN_SYSTEM_PATH}}" id="design-system-css"
          onerror="document.getElementById('ds-missing-banner').style.display='flex'">
    <!-- Brand Book (path set in docs/docs.config.js) -->
    {{BRAND_CSS}}

    <!-- Google Fonts (configured in docs/docs.config.js) -->
    {{GOOGLE_FONTS}}

    <!-- Markdown CSS -->
    <link rel="stylesheet" href="{{NAV_BASE}}assets/css/markdown.css">

    <!-- Site styles -->
    <link rel="stylesheet" href="{{NAV_BASE}}assets/css/style.css">

    <!-- GoTrue JS — Netlify Identity API client (skipped on localhost) -->
    <script type="module">
      if (!(window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0')) {
        const { default: GoTrue } = await import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm');
        window.GoTrue = GoTrue;
        window.dispatchEvent(new Event('gotrue-ready'));
      }
    </script>
</head>
<body class="auth-loading" data-access="{{PAGE_ACCESS}}">

    <!-- Design system missing banner (shown by JS if CSS variables fail to load) -->
    <div id="ds-missing-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#fffbea;border-bottom:1px solid #f0c040;padding:12px 20px;font-family:sans-serif;font-size:14px;color:#7a5c00;align-items:center;gap:12px;">
        <span>⚠️</span>
        <span>Design system CSS not found. Check the path in <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">docs/docs.config.js</code> → <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">designSystemPath</code>, then re-run <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">npm run docgen</code>.</span>
        <button onclick="document.getElementById('ds-missing-banner').style.display='none'" style="margin-left:auto;background:none;border:1px solid #f0c040;border-radius:4px;padding:4px 10px;cursor:pointer;color:#7a5c00;font-size:13px;">Dismiss</button>
    </div>

    <!-- Site Navigation (header + sidebar injected by nav.js) -->
    <div id="site-nav" data-base="{{NAV_BASE}}"></div>

    <div class="docs-main-area">
        <!-- Page Header (full width, outside grid) -->
        {{PAGE_HEADER}}

        <!-- Main Content + TOC grid -->
        <div class="docs-content-grid padding-global">
            <!-- Main Content -->
            <main class="docs-main">
                <article class="markdown-body">
                    {{PAGE_CONTENT}}
                </article>
            </main>

            <!-- Table of Contents -->
            {{TOC_SECTION}}
        </div>

        <!-- Page Navigation (Previous / Next) -->
        {{PAGE_NAV}}

        <!-- Footer -->
        <footer class="docs-footer">
            <div class="docs-footer-inner padding-global">
                <p class="docs-footer-text">{{FOOTER_TEXT}}</p>
            </div>
        </footer>
    </div>

    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Initialize Highlight.js, Copy, and TOC -->
    <script>
        (function() {
            'use strict';

            function initHighlight() {
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return Promise.resolve();
            }

            var copyIconPath = 'M8 14C8 15.1046 8.89543 16 10 16H18C19.1046 16 20 15.1046 20 14V6C20 4.89543 19.1046 4 18 4H10C8.89543 4 8 4.89543 8 6V14ZM6 18V2H22V18H6ZM2 22V6H4V20H18V22H2Z';
            var checkIconPath = 'M9.54998 18L3.84998 12.3L5.27498 10.875L8.13576 13.7358C8.91681 14.5168 10.1831 14.5168 10.9642 13.7358L18.725 5.97501L20.15 7.40001L9.54998 18Z';

            function initClipboard() {
                const buttons = document.querySelectorAll('.copy-code-btn');

                buttons.forEach(button => {
                    button.addEventListener('click', function() {
                        const targetId = this.getAttribute('data-clipboard-target');
                        const codeElement = document.querySelector(targetId);

                        if (codeElement) {
                            const text = codeElement.textContent;
                            const textSpan = this.querySelector('.copy-text');
                            const btnPath = this.querySelector('path');

                            copyToClipboard(text).then(() => {
                                if (btnPath) {
                                    btnPath.setAttribute('d', checkIconPath);
                                }
                                if (textSpan) {
                                    textSpan.textContent = 'Copied!';
                                }
                                setTimeout(() => {
                                    if (btnPath) {
                                        btnPath.setAttribute('d', copyIconPath);
                                    }
                                    if (textSpan) {
                                        textSpan.textContent = 'Copy';
                                    }
                                }, 1500);
                            });
                        }
                    });
                });
            }

            function initTOCActiveState() {
                const tocLinks = document.querySelectorAll('.toc-link');
                const headings = document.querySelectorAll('h1[id], h2[id]');

                if (tocLinks.length === 0 || headings.length === 0) return;

                const linkMap = new Map();
                tocLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && href.startsWith('#')) {
                        const id = href.substring(1);
                        linkMap.set(id, link);
                    }
                });

                const observerOptions = {
                    rootMargin: '-20% 0px -70% 0px',
                    threshold: 0
                };

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const id = entry.target.id;
                        const link = linkMap.get(id);

                        if (entry.isIntersecting) {
                            tocLinks.forEach(l => l.classList.remove('toc-link-active'));
                            if (link) {
                                link.classList.add('toc-link-active');
                            }
                        }
                    });
                }, observerOptions);

                headings.forEach(heading => {
                    if (heading.id) {
                        observer.observe(heading);
                    }
                });

                function setInitialActive() {
                    let activeHeading = null;
                    let maxTop = -Infinity;

                    headings.forEach(heading => {
                        const rect = heading.getBoundingClientRect();
                        if (rect.top <= 100 && rect.top > maxTop) {
                            maxTop = rect.top;
                            activeHeading = heading;
                        }
                    });

                    if (activeHeading && activeHeading.id) {
                        const link = linkMap.get(activeHeading.id);
                        if (link) {
                            tocLinks.forEach(l => l.classList.remove('toc-link-active'));
                            link.classList.add('toc-link-active');
                        }
                    }
                }

                setInitialActive();

                let scrollTimeout;
                window.addEventListener('scroll', () => {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(setInitialActive, 100);
                });
            }

            function init() {
                initHighlight();
                initClipboard();
                initTOCActiveState();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

    <!-- Back to Top -->
    <div class="back-to-top-wrapper">
      <button class="button is-faded is-icon back-to-top-btn" aria-label="Back to top" type="button">
        <div class="icn-svg"><svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 4V2H20V4H4Z" fill="currentColor"/>
          <path d="M11 22V12.2392C11 11.3483 9.92286 10.9021 9.29289 11.5321L5.4 15.425L4 14L12 6L20 14L18.6 15.425L14.7071 11.5321C14.0771 10.9021 13 11.3483 13 12.2392V22H11Z" fill="currentColor"/>
        </svg></div>
      </button>
    </div>
    <script>
      (function() {
        var btn = document.querySelector('.back-to-top-wrapper');
        if (!btn) return;
        window.addEventListener('scroll', function() {
          btn.classList.toggle('is-visible', window.scrollY > 300);
        });
        btn.querySelector('button').addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      })();
    </script>

    <!-- Site Navigation -->
    <script src="{{NAV_BASE}}assets/js/nav.js"></script>
    <!-- Auth -->
    <script src="{{NAV_BASE}}assets/js/auth-config.js"></script>
    <script src="{{NAV_BASE}}assets/js/auth.js"></script>

    <script>
      /* Table scroll overflow hint */
      (function initTableScroll() {
        var wrappers = document.querySelectorAll('.table-scroll');
        if (!wrappers.length) return;

        function checkOverflow(wrapper) {
          var isOverflowing = wrapper.scrollWidth > wrapper.clientWidth;
          var isAtEnd = wrapper.scrollLeft + wrapper.clientWidth >= wrapper.scrollWidth - 1;
          wrapper.classList.toggle('is-overflowing', isOverflowing);
          wrapper.classList.toggle('is-scrolled-end', isAtEnd);
        }

        wrappers.forEach(function(wrapper) {
          checkOverflow(wrapper);
          wrapper.addEventListener('scroll', function() { checkOverflow(wrapper); });
        });

        window.addEventListener('resize', function() {
          wrappers.forEach(checkOverflow);
        });
      })();
    </script>
</body>
</html>
