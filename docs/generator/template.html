<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}} - Documentation</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    
    <!-- Design System Framework (path set in docs/docs.config.js) -->
    <link rel="stylesheet" href="{{DESIGN_SYSTEM_PATH}}" id="design-system-css"
          onerror="document.getElementById('ds-missing-banner').style.display='flex'">
    <!-- Brand Book (path set in docs/docs.config.js) -->
    {{BRAND_CSS}}
    
    <!-- Google Fonts (configured in docs/docs.config.js) -->
    {{GOOGLE_FONTS}}
       
    <!-- Markdown CSS -->
    <link rel="stylesheet" href="assets/css/markdown.css">

    <!-- Site styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Design system missing banner (shown by JS if CSS variables fail to load) -->
    <div id="ds-missing-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#fffbea;border-bottom:1px solid #f0c040;padding:12px 20px;font-family:sans-serif;font-size:14px;color:#7a5c00;align-items:center;gap:12px;">
        <span>⚠️</span>
        <span>Design system CSS not found. Check the path in <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">docs/docs.config.js</code> → <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">designSystemPath</code>, then re-run <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">npm run docgen</code>.</span>
        <button onclick="document.getElementById('ds-missing-banner').style.display='none'" style="margin-left:auto;background:none;border:1px solid #f0c040;border-radius:4px;padding:4px 10px;cursor:pointer;color:#7a5c00;font-size:13px;">Dismiss</button>
    </div>

    <div class="docs-container">
        <!-- Sidebar Navigation (sticky on desktop, top bar on mobile) -->
        <aside class="docs-sidebar">
            <nav class="docs-nav">
                <div class="docs-sidebar-header">
                    <a href="{{INDEX_PATH}}" class="docs-logo-link">
                        <img src="assets/images/logo.svg" alt="Logo" class="nav-logo">
                        <img src="assets/images/logo-small.svg" alt="Logo" class="nav-logo-small">
                    </a>
                    <button class="docs-sidebar-toggle" aria-label="Collapse sidebar" type="button">
                        <svg class="sidebar-icon-open" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5.6 12L9.6 8L11 9.4L9.81421 10.5858C9.03316 11.3668 9.03316 12.6332 9.81421 13.4142L11 14.6L9.6 16L5.6 12Z" fill="currentColor"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M22 22H2V2H22V22ZM4 18C4 19.1046 4.89543 20 6 20H12C13.1046 20 14 19.1046 14 18V6C14 4.89543 13.1046 4 12 4H6C4.89543 4 4 4.89543 4 6V18ZM16 18C16 19.1046 16.8954 20 18 20C19.1046 20 20 19.1046 20 18V6C20 4.89543 19.1046 4 18 4C16.8954 4 16 4.89543 16 6V18Z" fill="currentColor"/>
                        </svg>
                        <svg class="sidebar-icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M12.4 12L8.4 16L7 14.6L8.18579 13.4142C8.96684 12.6332 8.96684 11.3668 8.18579 10.5858L7 9.4L8.4 8L12.4 12Z" fill="currentColor"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M22 22H2V2H22V22ZM4 18C4 19.1046 4.89543 20 6 20H12C13.1046 20 14 19.1046 14 18V6C14 4.89543 13.1046 4 12 4H6C4.89543 4 4 4.89543 4 6V18ZM16 18C16 19.1046 16.8954 20 18 20C19.1046 20 20 19.1046 20 18V6C20 4.89543 19.1046 4 18 4C16.8954 4 16 4.89543 16 6V18Z" fill="currentColor"/>
                        </svg>
                    </button>
                    <button class="docs-mobile-toggle" aria-label="Open navigation" type="button">
                        <svg class="mobile-icon-open" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M3 18V16H21V18H3ZM3 13V11H21V13H3ZM3 8V6H21V8H3Z" fill="currentColor"/>
                        </svg>
                        <svg class="mobile-icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M6.4 19L5 17.6L9.18579 13.4142C9.96684 12.6332 9.96684 11.3668 9.18579 10.5858L5 6.4L6.4 5L10.5858 9.18579C11.3668 9.96684 12.6332 9.96684 13.4142 9.18579L17.6 5L19 6.4L14.8142 10.5858C14.0332 11.3668 14.0332 12.6332 14.8142 13.4142L19 17.6L17.6 19L13.4142 14.8142C12.6332 14.0332 11.3668 14.0332 10.5858 14.8142L6.4 19Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="docs-nav-content">
                    {{NAVIGATION}}
                </div>
            </nav>
        </aside>

        <div class="docs-main-area">
            <!-- Page Header (full width, outside grid) -->
            {{PAGE_HEADER}}
            
            <!-- Main Content + TOC grid -->
            <div class="docs-content-grid padding-global">
                <!-- Main Content -->
                <main class="docs-main">
                    <article class="markdown-body">
                        {{PAGE_CONTENT}}
                    </article>
                </main>

                <!-- Table of Contents -->
                {{TOC_SECTION}}
            </div>
            
            <!-- Page Navigation (Previous / Next) -->
            {{PAGE_NAV}}

            <!-- Footer -->
            <footer class="docs-footer">
                <div class="docs-footer-inner padding-global">
                    <p class="docs-footer-text">{{FOOTER_TEXT}}</p>
                </div>
            </footer>
        </div>
    </div>

    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Initialize Highlight.js and Copy functionality -->
    <script>
        (function() {
            'use strict';
            
            function initHighlight() {
                // Initialize Highlight.js on all code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
            
            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return Promise.resolve();
            }

            function initClipboard() {
                const buttons = document.querySelectorAll('.copy-code-btn');

                buttons.forEach(button => {
                    button.addEventListener('click', function() {
                        const targetId = this.getAttribute('data-clipboard-target');
                        const codeElement = document.querySelector(targetId);

                        if (codeElement) {
                            const text = codeElement.textContent;
                            const textSpan = this.querySelector('.copy-text');

                            copyToClipboard(text).then(() => {
                                if (textSpan) {
                                    textSpan.textContent = 'Copied!';
                                    setTimeout(() => {
                                        textSpan.textContent = 'Copy';
                                    }, 1500);
                                }
                            });
                        }
                    });
                });
            }
            
            function initSidebarToggle() {
                var SIDEBAR_KEY = 'docs-sidebar-collapsed';
                var container = document.querySelector('.docs-container');
                var sidebarToggle = document.querySelector('.docs-sidebar-toggle');
                var mobileToggle = document.querySelector('.docs-mobile-toggle');

                if (!container) return;

                // Restore desktop sidebar state
                if (localStorage.getItem(SIDEBAR_KEY) === 'true') {
                    container.classList.add('sidebar-collapsed');
                    if (sidebarToggle) sidebarToggle.setAttribute('aria-label', 'Expand sidebar');
                }

                if (sidebarToggle) {
                    sidebarToggle.addEventListener('click', function onSidebarToggle() {
                        var isCollapsed = container.classList.toggle('sidebar-collapsed');
                        localStorage.setItem(SIDEBAR_KEY, isCollapsed);
                        sidebarToggle.setAttribute('aria-label', isCollapsed ? 'Expand sidebar' : 'Collapse sidebar');
                    });
                }

                if (mobileToggle) {
                    mobileToggle.addEventListener('click', function onMobileToggle() {
                        var isOpen = container.classList.toggle('mobile-nav-open');
                        mobileToggle.setAttribute('aria-label', isOpen ? 'Close navigation' : 'Open navigation');
                    });
                }
            }

            function initTOCActiveState() {
                const tocLinks = document.querySelectorAll('.toc-link');
                const headings = document.querySelectorAll('h1[id], h2[id]');
                
                if (tocLinks.length === 0 || headings.length === 0) return;
                
                // Create a map of heading IDs to TOC links
                const linkMap = new Map();
                tocLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && href.startsWith('#')) {
                        const id = href.substring(1);
                        linkMap.set(id, link);
                    }
                });
                
                // Intersection Observer to detect which heading is in view
                const observerOptions = {
                    rootMargin: '-20% 0px -70% 0px', // Trigger when heading is in top 30% of viewport
                    threshold: 0
                };
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const id = entry.target.id;
                        const link = linkMap.get(id);
                        
                        if (entry.isIntersecting) {
                            // Remove active from all links
                            tocLinks.forEach(l => l.classList.remove('toc-link-active'));
                            // Add active to current link
                            if (link) {
                                link.classList.add('toc-link-active');
                            }
                        }
                    });
                }, observerOptions);
                
                // Observe all headings
                headings.forEach(heading => {
                    if (heading.id) {
                        observer.observe(heading);
                    }
                });
                
                // Set initial active state based on scroll position
                function setInitialActive() {
                    let activeHeading = null;
                    let maxTop = -Infinity;
                    
                    headings.forEach(heading => {
                        const rect = heading.getBoundingClientRect();
                        if (rect.top <= 100 && rect.top > maxTop) {
                            maxTop = rect.top;
                            activeHeading = heading;
                        }
                    });
                    
                    if (activeHeading && activeHeading.id) {
                        const link = linkMap.get(activeHeading.id);
                        if (link) {
                            tocLinks.forEach(l => l.classList.remove('toc-link-active'));
                            link.classList.add('toc-link-active');
                        }
                    }
                }
                
                // Set initial state
                setInitialActive();
                
                // Update on scroll (debounced)
                let scrollTimeout;
                window.addEventListener('scroll', () => {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(setInitialActive, 100);
                });
            }
            
            function init() {
                initSidebarToggle();
                initHighlight();
                initClipboard();
                initTOCActiveState();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
