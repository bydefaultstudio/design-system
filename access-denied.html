<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - By Default Brand OS</title>
  <meta name="description" content="You do not have permission to view this page.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">

  <!-- Robots -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Brand Book -->
  <link rel="stylesheet" href="brand-book/brand-book.css">
  <!-- Design System Framework -->
  <link rel="stylesheet" href="design-system/design-system.css">
  <!-- Site styles -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- GoTrue JS (skipped on localhost) -->
  <script>
    if (!(window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0')) {
      document.write('<script src="https://unpkg.com/gotrue-js@0.9.29/dist/goTrue.umd.js"><\/script>');
    }
  </script>
</head>

<body data-access="public">

  <!-- Site Navigation (header + sidebar injected by nav.js) -->
  <div id="site-nav" data-base=""></div>

  <div class="page-wrapper has-sidebar">
    <div class="page-content">
      <section>
        <div class="padding-global">
          <div class="container-medium">
            <div class="access-denied-wrapper">
              <h1>Access Denied</h1>
              <p>You don't have permission to view this page. Please contact an administrator if you believe this is an error.</p>
              <div class="button-group justify-center">
                <a href="index.html" class="button">Go to Home</a>
                <button class="button is-outline" type="button" id="access-denied-login-btn">Log in with a different account</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- Site Navigation -->
  <script src="assets/js/nav.js"></script>
  <!-- Auth -->
  <script src="assets/js/auth-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (function () {
      'use strict';
      var loginBtn = document.getElementById('access-denied-login-btn');
      if (!loginBtn) return;

      loginBtn.addEventListener('click', function () {
        var isDev = window.location.hostname === 'localhost' ||
                    window.location.hostname === '127.0.0.1' ||
                    window.location.hostname === '0.0.0.0';

        if (isDev) {
          sessionStorage.removeItem('auth-dev-role');
        }

        // Redirect to login page
        window.location.href = 'auth/login.html';
      });
    })();
  </script>
</body>

</html>
