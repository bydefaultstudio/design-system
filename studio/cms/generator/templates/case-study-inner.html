      <div class="page-wrapper case-study-wrapper" data-case-study>
        <section class="case-study-header" data-inset="all">
          <div class="section-content top-medium bottom-medium" data-grid>
            <div class="block case-study-header-content" data-col-span="6" data-col-start="2">
              <span class="label case-study-client">{{client}}</span>
              <h1 class="case-study-title">{{title}}</h1>
              <p class="case-study-synopsis">{{synopsis}}</p>
              {{servicesBlock}}
            </div>
            <div class="block case-study-header-actions" data-col-span="2" data-col-start="10">
              {{infoToggle}}
            </div>
          </div>
        </section>
        <section class="case-study-body">
          <div class="case-study-visuals">
{{visualsBody}}
          </div>
          <div class="case-study-content">
            <div class="case-study-content-inner">
{{infoBody}}
            </div>
          </div>
        </section>
        <section class="case-study-slider" data-case-study-slider>
          <div class="splide case-study-splide">
            <div class="case-study-slider-header padding-global">
              <h2 class="case-study-slider-title" data-bd-animate="fade">More Work</h2>
              <div class="splide__arrows">
                <button class="button case-study-arrow splide__arrow--prev" data-variant="faded" data-icon-only type="button" aria-label="Previous slide">
                  <div class="svg-icn"><svg data-icon="arrow-left" width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true"><use href="/assets/images/svg-icons/_sprite.svg#arrow-left"/></svg></div>
                </button>
                <button class="button case-study-arrow splide__arrow--next" data-variant="faded" data-icon-only type="button" aria-label="Next slide">
                  <div class="svg-icn"><svg data-icon="arrow-right" width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true"><use href="/assets/images/svg-icons/_sprite.svg#arrow-right"/></svg></div>
                </button>
              </div>
            </div>
            <div class="splide__track case-study-track">
              <div class="splide__list case-study-list" data-case-study-slides></div>
            </div>
          </div>
        </section>
      </div>
