          <article class="page-wrapper article">

            <section id="{{namespace}}" class="article-lead" data-article="{{namespace}}">
              <div class="article-header" data-grid>
                <div class="block" data-col-span="10" data-col-start="2">
                  <div class="article-meta">
                    <span class="article-meta-item label"><div class="svg-icn"><svg data-icon="clock" width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true"><use href="/assets/images/svg-icons/_sprite.svg#clock"/></svg></div>{{readTime}}</span>
                    <span class="article-meta-item label">{{displayDate}}</span>
                  </div>
                  <h1 class="article-headline">{{title}}</h1>
                  <a href="../about.html" class="article-author">
                    <img src="{{authorAvatar}}" alt="" class="article-author-avatar" loading="lazy">
                    <span class="article-author-by">by</span> {{authorName}}
                  </a>
                </div>
              </div>
            </section>

            <section class="article-hero" data-inset="all">
              <div class="section-content" data-grid>
                <div class="block" data-col-span="12">
                  <div class="media-frame" data-ratio="16:9" data-bd-animate="slide-up">
                    <img src="{{hero}}" alt="" loading="lazy">
                  </div>
                </div>
              </div>
            </section>

            <section class="top-medium bottom-medium">
              <div class="padding-global">
                <div class="article-content-wrapper">

                  <aside class="article-sidebar">
                    <div class="toc-block">
                      <div class="article-meta-item label">Table of contents</div>
                    </div>
                  </aside>

                  <div class="article-body">
                    <div class="in-this-article">
                      <div class="article-meta-item label">In this article</div>
                    </div>

{{body}}
                  </div>

                  <aside class="article-sidebar">
                    <div class="share-block">
                      <div class="article-meta-item label">Share this page</div>
                      <div class="share-links">
                        <button type="button" class="button share-copy" data-variant="text"><div class="svg-icn"><svg data-icon="copy" width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true"><use href="/assets/images/svg-icons/_sprite.svg#copy"/></svg></div>Copy link</button>
                        <button type="button" class="button share-linkedin" data-variant="text"><div class="svg-icn"><svg data-icon="linkedin" width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true"><use href="/assets/images/svg-icons/_sprite.svg#linkedin"/></svg></div>LinkedIn</button>
                      </div>
                    </div>
                  </aside>

                </div>
              </div>
            </section>

          </article>
