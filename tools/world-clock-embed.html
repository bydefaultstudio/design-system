<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --clock-text: #1a1a1a;
      --clock-text-secondary: #6b6b6b;
    }

    :root[data-theme="dark"] {
      --clock-text: #f5f5f5;
      --clock-text-secondary: #a0a0a0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .clock-container {
      width: 100%;
      padding: 1.5rem;
      text-align: center;
    }

    .clock-row {
      display: flex;
      width: 100%;
      align-items: flex-start;
      flex-wrap: nowrap;
      gap: 1.5rem;
    }

    .clock-column {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .clock-time {
      font-size: 2.5rem;
      color: var(--clock-text);
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
    }

    .clock-city {
      font-size: 0.75rem;
      color: var(--clock-text);
      font-weight: 500;
      line-height: 1.4;
      white-space: nowrap;
    }

    .clock-timezone {
      font-size: 0.625rem;
      color: var(--clock-text-secondary);
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .clock-container { padding: 1rem; }
      .clock-time { font-size: 1.5rem; }
    }
  </style>
</head>

<body>
  <div id="clock-root"></div>

  <script src="../assets/js/world-clock-core.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);

      /* Theme */
      var theme = params.get('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);

      /* Cities */
      var citiesParam = params.get('cities');
      var cities = citiesParam
        ? citiesParam.split(',').map(function (c) { return c.trim(); }).filter(Boolean)
        : ['Europe/London', 'America/New_York', 'Asia/Tokyo'];

      /* Display options */
      var showCity = params.get('showCity') !== 'false';
      var showTimezone = params.get('showTz') !== 'false';
      var showSeconds = params.get('showSeconds') === 'true';
      var intervalParam = params.get('interval');
      var interval = intervalParam ? parseInt(intervalParam, 10) * 1000 : null;

      WorldClockCore.init(document.getElementById('clock-root'), {
        cities: cities,
        showCity: showCity,
        showTimezone: showTimezone,
        showSeconds: showSeconds,
        interval: interval
      });
    })();
  </script>
</body>

</html>
