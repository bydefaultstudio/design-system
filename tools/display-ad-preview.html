<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Essential -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Ad Preview</title>
  <meta name="description" content="Generate Celtra ad preview sandbox URLs with device simulation and publisher context." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">

  <!-- Open Graph -->
  <meta property="og:title" content="Display Ad Preview - By Default Brand OS">
  <meta property="og:description" content="Generate Celtra ad preview sandbox URLs with device simulation and publisher context.">
  <meta property="og:image" content="../assets/images/og/og-default.jpg">
  <meta property="og:type" content="website">

  <!-- Robots -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Design System Framework -->
  <link rel="stylesheet" href="../assets/css/design-system.css" />
  <!-- Site styles -->
  <link rel="stylesheet" href="../assets/css/style.css" />
  <!-- Ad Preview Styles (last) -->
  <link rel="stylesheet" href="../assets/css/ad-preview.css" />

  <!-- GoTrue JS (skipped on localhost) -->
  <script>
    window._gotrueReady = (function() {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0') {
        return Promise.resolve(null);
      }
      return import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm')
        .then(function(m) { var G = m.default && m.default.default ? m.default.default : m.default; window.GoTrue = G; return G; })
        .catch(function(e) { console.error('[Auth] GoTrue load failed:', e); return null; });
    })();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="auth-loading" data-access="client:dianomi,client-template">

  <!-- Site Navigation (header only, no sidebar) -->
  <div id="site-nav" data-base="../" data-sidebar="false"></div>

  <div class="adp-layout">

    <!-- Toolbar -->
    <div class="adp-bar">
      <div class="adp-bar-row">
        <!-- Creative ID -->
        <div class="block row gap-xs" style="align-items: center;">
          <label for="creativeId" class="text-size-small">Creative ID</label>
          <input type="text" id="creativeId" placeholder="e.g. 81e89b8a" aria-label="Creative ID">
        </div>

        <span class="divider--vertical" aria-hidden="true"></span>

        <!-- Publisher -->
        <div class="block row gap-xs" style="align-items: center;">
          <label for="publisher" class="text-size-small">Publisher</label>
          <select id="publisher" aria-label="Publisher"></select>
        </div>

        <span class="divider--vertical" aria-hidden="true"></span>

        <!-- Device -->
        <div class="segmented-control" id="deviceType">
          <button type="button" class="segmented-control-btn is-icon is-active" data-value="Desktop" aria-label="Desktop">
            <div class="icn-svg" data-icon="desktop">
              <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true">
                <path d="M2 3H22V17H2V3ZM4 5V15H20V5H4ZM8 21H16V19H13V17H11V19H8V21Z" fill="currentColor"/>
              </svg>
            </div>
          </button>
          <button type="button" class="segmented-control-btn is-icon" data-value="Tablet" aria-label="Tablet">
            <div class="icn-svg" data-icon="tablet">
              <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true">
                <path d="M5 2H19V22H5V2ZM7 4V18H17V4H7ZM11 19H13V20H11V19Z" fill="currentColor"/>
              </svg>
            </div>
          </button>
          <button type="button" class="segmented-control-btn is-icon" data-value="Phone" aria-label="Phone">
            <div class="icn-svg" data-icon="phone">
              <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true">
                <path d="M7 2H17V22H7V2ZM9 4V18H15V4H9ZM11 19H13V20H11V19Z" fill="currentColor"/>
              </svg>
            </div>
          </button>
        </div>

        <!-- Device size dropdown (conditional — Phone/Tablet only) -->
        <div class="dropdown is-hidden" id="deviceSizeDropdown">
          <button class="dropdown-trigger" type="button" aria-haspopup="true" aria-expanded="false" id="deviceSizeLabel">
            Size
          </button>
          <div class="dropdown-menu" role="menu" id="deviceSizeMenu">
            <!-- Phone sizes -->
            <div id="phoneSizeItems">
              <button class="dropdown-item" role="menuitem" type="button" data-size="320">XS — 320px</button>
              <button class="dropdown-item" role="menuitem" type="button" data-size="375">S — 375px</button>
              <button class="dropdown-item is-active" role="menuitem" type="button" data-size="390">M — 390px</button>
              <button class="dropdown-item" role="menuitem" type="button" data-size="428">L — 428px</button>
            </div>
            <!-- Tablet sizes -->
            <div id="tabletSizeItems" class="is-hidden">
              <button class="dropdown-item" role="menuitem" type="button" data-size="600">S — 600px</button>
              <button class="dropdown-item is-active" role="menuitem" type="button" data-size="768">M — 768px</button>
              <button class="dropdown-item" role="menuitem" type="button" data-size="800">L — 800px</button>
            </div>
          </div>
        </div>

        <!-- Settings dropdown (Preview, Fold, Position) -->
        <span class="divider--vertical" aria-hidden="true"></span>

        <div class="dropdown" id="settingsDropdown">
          <button class="dropdown-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <div class="icn-svg" data-icon="settings">
              <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M11 15H22V17H11V19H5V17H2V15H5V13H11V15ZM7 17H9V15H7V17Z" fill="currentColor"/><path fill-rule="evenodd" clip-rule="evenodd" d="M19 7H22V9H19V11H13V9H2V7H13V5H19V7ZM15 9H17V7H15V9Z" fill="currentColor"/></svg>
            </div>
            Settings
          </button>
          <div class="dropdown-menu is-right" role="menu" style="min-width: 240px; padding: var(--space-m);">
            <div class="block gap-m">
              <!-- Preview mode -->
              <div class="block gap-xs">
                <label class="text-size-small">Preview</label>
                <div class="segmented-control" id="stickyMode">
                  <button type="button" class="segmented-control-btn is-active" data-value="inline">Inline</button>
                  <button type="button" class="segmented-control-btn" data-value="top">Sticky Top</button>
                  <button type="button" class="segmented-control-btn" data-value="bottom">Sticky Btm</button>
                  <button type="button" class="segmented-control-btn" data-value="fullscreen">Fullscreen</button>
                </div>
              </div>

              <!-- Fold position -->
              <div class="block gap-xs">
                <label class="text-size-small">Fold</label>
                <div class="segmented-control" id="foldPosition">
                  <button type="button" class="segmented-control-btn is-active" data-value="above">Above</button>
                  <button type="button" class="segmented-control-btn" data-value="below">Below</button>
                </div>
              </div>

              <!-- Creative position (Desktop only) -->
              <div class="block gap-xs" id="positionSection">
                <label class="text-size-small">Position</label>
                <div class="segmented-control" id="creativePosition">
                  <button type="button" class="segmented-control-btn is-active" data-value="top">Top</button>
                  <button type="button" class="segmented-control-btn" data-value="left">Left</button>
                  <button type="button" class="segmented-control-btn" data-value="right">Right</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Actions (right-aligned) -->
        <div style="margin-left: auto; display: flex; align-items: center; gap: var(--space-m);">
          <a id="openLink" href="#" target="_blank" class="text-size-small is-hidden">Open in tab</a>
          <button class="button is-small copy-btn is-hidden" id="copyBtn" data-copy="" type="button">
            <div class="icn-svg" data-icon="copy">
              <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%" aria-hidden="true">
                <path d="M8 14C8 15.1046 8.89543 16 10 16H18C19.1046 16 20 15.1046 20 14V6C20 4.89543 19.1046 4 18 4H10C8.89543 4 8 4.89543 8 6V14ZM6 18V2H22V18H6ZM2 22V6H4V20H18V22H2Z" fill="currentColor"/>
              </svg>
            </div>
            <span class="copy-btn-label-default">Copy URL</span>
            <span class="copy-btn-label-copied">Copied!</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Preview Area -->
    <div class="adp-preview" id="previewArea">
      <div class="adp-placeholder" id="placeholder">
        <div class="icon">&#x1F50D;</div>
        <p>Enter a Creative ID to see a live preview</p>
      </div>
    </div>

  </div>

  <script>
    /**
     * Script Purpose: Display Ad Preview — toolbar UI
     * Author: By Default Studio
     * Version: 2.0.0
     * Last Updated: 2026-04-03
     */

    console.log('Display Ad Preview v2.0.0');

    // ── Data ──

    var publishers = {
      'none': null,
      'forbes': {
        name: 'Forbes',
        bgColor: '#0a0a0a',
        textColor: '#fff',
        borderColor: 'rgba(255,255,255,0.1)',
        logo: '../assets/images/logos/logo_forbes.svg',
        logoFilter: 'brightness(0) invert(1)'
      },
      'reuters': {
        name: 'Reuters',
        bgColor: '#ffffff',
        textColor: '#222',
        borderColor: 'rgba(0,0,0,0.1)',
        logo: '../assets/images/logos/logo_reuters.svg',
        logoFilter: null
      },
      'wsj': {
        name: 'The Wall Street Journal',
        bgColor: '#ffffff',
        textColor: '#222',
        borderColor: 'rgba(0,0,0,0.1)',
        logoMobile: '../assets/images/logos/logo_wsj-mobile.svg',
        logoDesktop: '../assets/images/logos/logo_wsj-desktop.svg',
        logoFilter: null
      }
    };

    var phoneDevices = {
      '320': 'iPhone 5 — 320 x 568',
      '375': 'iPhone 13 Mini / Galaxy S21 — 375 x 812',
      '390': 'iPhone 14 / Galaxy S21+ — 390 x 844',
      '428': 'iPhone 14 Plus / Galaxy S21 Ultra — 428 x 926'
    };

    var tabletDevices = {
      '600': '7" Galaxy Tab 7 — 600px',
      '768': '9" iPad / Nexus 7 — 768px',
      '800': '10" Galaxy Tab 10 — 800px'
    };

    // ── State ──

    var state = {
      creativeId: '',
      publisher: 'none',
      deviceType: 'Desktop',
      phoneSize: '390',
      tabletSize: '768',
      stickyMode: 'inline',
      foldPosition: 'above',
      creativePosition: 'top'
    };

    var debounceTimer = null;
    var suppressHashUpdate = false;
    var currentURL = '';

    // ── Hash sync ──

    function stateToHash() {
      var p = new URLSearchParams();
      if (state.creativeId) p.set('id', state.creativeId);
      p.set('device', state.deviceType);
      if (state.deviceType === 'Phone') p.set('phoneSize', state.phoneSize);
      if (state.deviceType === 'Tablet') p.set('tabletSize', state.tabletSize);
      if (state.publisher !== 'none') p.set('pub', state.publisher);
      if (state.stickyMode !== 'inline') p.set('sticky', state.stickyMode);
      if (state.foldPosition !== 'above') p.set('fold', state.foldPosition);
      if (state.deviceType === 'Desktop' && state.creativePosition !== 'top') {
        p.set('position', state.creativePosition);
      }
      return p.toString();
    }

    function hashToState() {
      var hash = window.location.hash.slice(1);
      if (!hash) return false;

      var p = new URLSearchParams(hash);
      var changed = false;

      if (p.has('id')) { state.creativeId = p.get('id'); changed = true; }
      if (p.has('device')) { state.deviceType = p.get('device'); changed = true; }
      if (p.has('phoneSize')) { state.phoneSize = p.get('phoneSize'); changed = true; }
      if (p.has('tabletSize')) { state.tabletSize = p.get('tabletSize'); changed = true; }
      state.publisher = p.get('pub') || 'none';
      state.stickyMode = p.get('sticky') || 'inline';
      state.foldPosition = p.get('fold') || 'above';
      state.creativePosition = p.get('position') || 'top';

      return changed;
    }

    function updateHash() {
      if (suppressHashUpdate) return;
      history.replaceState(null, '', '#' + stateToHash());
    }

    // ── UI sync ──

    function syncUIFromState() {
      document.getElementById('creativeId').value = state.creativeId;
      document.getElementById('publisher').value = state.publisher;
      syncSegmented('deviceType', state.deviceType);
      syncSegmented('stickyMode', state.stickyMode);
      syncSegmented('foldPosition', state.foldPosition);
      syncSegmented('creativePosition', state.creativePosition);
      updateDeviceSections();
    }

    function syncSegmented(groupId, value) {
      var el = document.getElementById(groupId);
      if (!el) return;
      el.querySelectorAll('.segmented-control-btn').forEach(function(btn) {
        btn.classList.toggle('is-active', btn.dataset.value === value);
      });
    }

    // ── Controls ──

    function handleSegmentedClick(groupId, btn) {
      var group = document.getElementById(groupId);
      group.querySelectorAll('.segmented-control-btn').forEach(function(b) {
        b.classList.remove('is-active');
      });
      btn.classList.add('is-active');
      state[groupId] = btn.dataset.value;

      if (groupId === 'deviceType') {
        updateDeviceSections();
        updateNavBar();
      }

      buildURL();
    }

    // Handle device size dropdown clicks
    function handleDeviceSizeClick(btn) {
      var size = btn.dataset.size;
      if (!size) return;
      var device = state.deviceType;
      if (device === 'Phone') state.phoneSize = size;
      if (device === 'Tablet') state.tabletSize = size;

      // Update active state in dropdown
      btn.closest('[id$="SizeItems"]').querySelectorAll('.dropdown-item').forEach(function(item) {
        item.classList.remove('is-active');
      });
      btn.classList.add('is-active');

      // Update trigger label
      document.getElementById('deviceSizeLabel').textContent = size + 'px';

      // Close dropdown and rebuild
      var dd = document.getElementById('deviceSizeDropdown');
      if (dd) dd.classList.remove('is-open');
      updateHash();
      buildURL();
    }

    function setPublisher(value) {
      state.publisher = value;
      updateHash();
      updateNavBar();
    }

    function updateDeviceSections() {
      var device = state.deviceType;
      var sizeDropdown = document.getElementById('deviceSizeDropdown');
      var phoneSizeItems = document.getElementById('phoneSizeItems');
      var tabletSizeItems = document.getElementById('tabletSizeItems');
      var positionSection = document.getElementById('positionSection');
      var sizeLabel = document.getElementById('deviceSizeLabel');

      // Show/hide device size dropdown
      if (device === 'Phone' || device === 'Tablet') {
        sizeDropdown.classList.remove('is-hidden');
        phoneSizeItems.classList.toggle('is-hidden', device !== 'Phone');
        tabletSizeItems.classList.toggle('is-hidden', device !== 'Tablet');
        // Update dropdown trigger label
        var size = device === 'Phone' ? state.phoneSize : state.tabletSize;
        var devices = device === 'Phone' ? phoneDevices : tabletDevices;
        sizeLabel.textContent = size + 'px';
      } else {
        sizeDropdown.classList.add('is-hidden');
      }

      // Show/hide creative position (Desktop only)
      positionSection.classList.toggle('is-hidden', device !== 'Desktop');
    }

    // ── URL building & preview ──

    function buildURL() {
      state.creativeId = document.getElementById('creativeId').value.trim();
      updateHash();

      if (!state.creativeId) {
        document.getElementById('copyBtn').classList.add('is-hidden');
        document.getElementById('openLink').classList.add('is-hidden');
        currentURL = '';
        showPlaceholder();
        return;
      }

      var params = new URLSearchParams();
      params.set('overrides.deviceInfo.deviceType', state.deviceType);

      if (state.deviceType === 'Phone') {
        params.set('placementWidth', state.phoneSize);
        params.set('placementHeight', 'auto');
      } else if (state.deviceType === 'Tablet') {
        params.set('placementWidth', state.tabletSize);
        params.set('placementHeight', 'auto');
      } else if (state.deviceType === 'Desktop') {
        params.set('desktopPreviewFrame', '1');
        if (state.creativePosition !== 'top') {
          params.set('rp.creativePosition', state.creativePosition);
        }
      }

      if (state.stickyMode !== 'inline') params.set('rp.sticky', state.stickyMode);
      if (state.foldPosition === 'below') params.set('rp.foldPosition', 'below');

      currentURL = 'https://preview-sandbox.celtra.com/preview/' + state.creativeId + '/frame?' + params.toString();

      document.getElementById('copyBtn').classList.remove('is-hidden');
      document.getElementById('copyBtn').setAttribute('data-copy', currentURL);
      document.getElementById('openLink').classList.remove('is-hidden');
      document.getElementById('openLink').href = currentURL;

      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() { updatePreview(currentURL); }, 600);
    }

    function updatePreview(url) {
      var area = document.getElementById('previewArea');

      var placeholder = document.getElementById('placeholder');
      if (placeholder) placeholder.remove();

      var existing = area.querySelector('.adp-wrapper');
      if (existing) existing.remove();

      var wrapper = document.createElement('div');
      wrapper.className = 'adp-wrapper';

      var frame = document.createElement('div');
      frame.className = 'adp-device';

      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.setAttribute('allow', 'autoplay; encrypted-media');
      iframe.setAttribute('allowfullscreen', '');

      var label = document.createElement('div');
      label.className = 'adp-viewport';

      if (state.deviceType === 'Phone') {
        var w = parseInt(state.phoneSize);
        iframe.style.width = w + 'px';
        iframe.style.maxWidth = '100%';
        frame.classList.add('phone');
        label.textContent = w + 'px \u2014 ' + (phoneDevices[state.phoneSize] || '');
      } else if (state.deviceType === 'Tablet') {
        var tw = parseInt(state.tabletSize);
        iframe.style.width = tw + 'px';
        iframe.style.maxWidth = '100%';
        frame.classList.add('tablet');
        label.textContent = tw + 'px \u2014 ' + (tabletDevices[state.tabletSize] || '');
      } else {
        frame.classList.add('desktop');
        label.textContent = 'Desktop \u2014 full width';
      }

      frame.appendChild(iframe);
      wrapper.appendChild(frame);
      wrapper.appendChild(label);
      area.appendChild(wrapper);

      updateNavBar();
    }

    function getLogoSrc(pub) {
      var isDesktop = state.deviceType === 'Desktop';
      if (isDesktop && pub.logoDesktop) return pub.logoDesktop;
      if (!isDesktop && pub.logoMobile) return pub.logoMobile;
      return pub.logo || null;
    }

    function getNavWidth() {
      if (state.deviceType === 'Phone') return parseInt(state.phoneSize);
      if (state.deviceType === 'Tablet') return parseInt(state.tabletSize);
      return null;
    }

    function updateNavBar() {
      var frame = document.querySelector('.adp-device');
      if (!frame) return;

      var existing = frame.querySelector('.adp-nav');
      if (existing) existing.remove();

      var pub = publishers[state.publisher];
      if (!pub) return;

      var nav = document.createElement('div');
      nav.className = 'adp-nav';
      if (state.deviceType === 'Desktop') nav.classList.add('desktop-nav');
      nav.style.backgroundColor = pub.bgColor;
      nav.style.color = pub.textColor;
      nav.style.borderBottom = '1px solid ' + pub.borderColor;

      var navWidth = getNavWidth();
      if (navWidth) {
        nav.style.width = navWidth + 'px';
        nav.style.maxWidth = '100%';
      } else {
        nav.style.width = '100%';
      }

      var logoWrap = document.createElement('div');
      logoWrap.className = 'pub-logo';

      var logoSrc = getLogoSrc(pub);
      if (logoSrc) {
        var img = document.createElement('img');
        img.src = logoSrc;
        img.alt = pub.name;
        if (pub.logoFilter) img.style.filter = pub.logoFilter;
        img.onerror = function() {
          img.remove();
          var text = document.createElement('span');
          text.className = 'pub-logo-text';
          text.textContent = pub.name;
          logoWrap.appendChild(text);
        };
        logoWrap.appendChild(img);
      } else {
        var text = document.createElement('span');
        text.className = 'pub-logo-text';
        text.textContent = pub.name;
        logoWrap.appendChild(text);
      }
      nav.appendChild(logoWrap);

      var burger = document.createElement('div');
      burger.className = 'pub-burger';
      for (var i = 0; i < 3; i++) {
        var line = document.createElement('span');
        line.style.backgroundColor = pub.textColor;
        burger.appendChild(line);
      }
      nav.appendChild(burger);

      frame.appendChild(nav);
    }

    function populatePublisherDropdown() {
      var select = document.getElementById('publisher');
      select.innerHTML = '';
      for (var key in publishers) {
        var opt = document.createElement('option');
        opt.value = key;
        opt.textContent = key === 'none' ? 'None' : publishers[key].name;
        select.appendChild(opt);
      }
    }

    function showPlaceholder() {
      var area = document.getElementById('previewArea');
      var existing = area.querySelector('.adp-wrapper');
      if (existing) existing.remove();

      if (!document.getElementById('placeholder')) {
        var div = document.createElement('div');
        div.className = 'adp-placeholder';
        div.id = 'placeholder';
        div.innerHTML = '<div class="icon">&#x1F50D;</div><p>Enter a Creative ID to see a live preview</p>';
        area.appendChild(div);
      }
    }

    // Copy handled by copy-button.js via data-copy attribute

    // ── Mobile: redirect to Celtra native preview ──

    function isMobileDevice() {
      var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      var isSmallScreen = window.innerWidth <= 768;
      var isMobileUA = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return (hasTouch && isSmallScreen) || isMobileUA;
    }

    // ── Event listeners ──

    function setupEventListeners() {
      // Creative ID input
      document.getElementById('creativeId').addEventListener('input', buildURL);

      // Publisher select
      document.getElementById('publisher').addEventListener('change', function() {
        setPublisher(this.value);
      });

      // Copy button handled by copy-button.js

      // Device size dropdown
      document.getElementById('deviceSizeMenu').addEventListener('click', function(e) {
        var btn = e.target.closest('[data-size]');
        if (btn) handleDeviceSizeClick(btn);
      });

      // All segmented controls
      var groups = ['deviceType', 'stickyMode', 'foldPosition', 'creativePosition'];
      groups.forEach(function(groupId) {
        var el = document.getElementById(groupId);
        if (!el) return;
        el.querySelectorAll('.segmented-control-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            handleSegmentedClick(groupId, btn);
          });
        });
      });
    }

    // ── Initialize ──

    populatePublisherDropdown();

    window.addEventListener('hashchange', function() {
      suppressHashUpdate = true;
      if (hashToState()) {
        syncUIFromState();
        buildURL();
      }
      suppressHashUpdate = false;
    });

    if (window.location.hash.length > 1) {
      suppressHashUpdate = true;
      hashToState();
      syncUIFromState();
      suppressHashUpdate = false;
    }

    if (isMobileDevice()) {
      if (state.creativeId) {
        window.location.replace(
          'https://preview-sandbox.celtra.com/preview/' + state.creativeId + '/frame?overrides.deviceInfo.deviceType=' + state.deviceType
        );
      }
    } else {
      setupEventListeners();
      if (window.location.hash.length > 1) {
        buildURL();
      } else {
        updateDeviceSections();
      }
    }
  </script>

  <!-- Component JS -->
