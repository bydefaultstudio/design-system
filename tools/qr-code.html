  <script>
    /**
     * Script Purpose: QR Code Generator UI
     * Author: By Default Studio
     * Version: 1.0.0
     * Last Updated: 2026-04-09
     */

    console.log('QR Code Generator v1.0.0');

    //
    //------- Utility Functions -------//
    //

    function clamp(val, min, max) {
      return Math.min(Math.max(val, min), max);
    }

    function isValidHex(hex) {
      return /^#[0-9A-Fa-f]{6}$/.test(hex);
    }

    function normaliseHex(raw) {
      var h = raw.trim();
      if (h.charAt(0) !== '#') h = '#' + h;
      return h.toUpperCase();
    }

    //
    //------- QR Generation -------//
    //

    var _currentMatrix = null;
    var _currentModuleCount = 0;

    function generateQRMatrix(text, ecLevel) {
      var qr = qrcode(0, ecLevel);
      qr.addData(text);
      qr.make();

      var count = qr.getModuleCount();
      var matrix = [];
      for (var row = 0; row < count; row++) {
        matrix[row] = [];
        for (var col = 0; col < count; col++) {
          matrix[row][col] = qr.isDark(row, col);
        }
      }

      _currentMatrix = matrix;
      _currentModuleCount = count;
      return { matrix: matrix, moduleCount: count };
    }

    //
    //------- Canvas Rendering -------//
    //

    function drawRoundedRect(ctx, x, y, w, h, r) {
      if (r <= 0) {
        ctx.fillRect(x, y, w, h);
        return;
      }
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function renderToCanvas(canvas, matrix, moduleCount, options) {
      var size = options.size;
      var quietZone = options.quietZone;
      var totalModules = moduleCount + quietZone * 2;
      var cellSize = size / totalModules;
      var radiusRatio = options.moduleRadius;
      var cornerRadius = cellSize * radiusRatio;

      canvas.width = size;
      canvas.height = size;

      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);

      if (!options.transparentBg) {
        ctx.fillStyle = options.bgColor;
        ctx.fillRect(0, 0, size, size);
      }

      ctx.fillStyle = options.fillColor;

      for (var row = 0; row < moduleCount; row++) {
        for (var col = 0; col < moduleCount; col++) {
          if (matrix[row][col]) {
            var x = (col + quietZone) * cellSize;
            var y = (row + quietZone) * cellSize;
            drawRoundedRect(ctx, x, y, cellSize, cellSize, cornerRadius);
          }
        }
      }
    }

    //
    //------- SVG Generation -------//
    //

    function generateSVGString(matrix, moduleCount, options) {
      var size = options.size;
      var quietZone = options.quietZone;
      var totalModules = moduleCount + quietZone * 2;
      var cellSize = size / totalModules;
      var radiusRatio = options.moduleRadius;
      var cornerRadius = cellSize * radiusRatio;
      var rx = cornerRadius > 0 ? ' rx="' + cornerRadius.toFixed(2) + '" ry="' + cornerRadius.toFixed(2) + '"' : '';

      var parts = [];
      parts.push('<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">');

      if (!options.transparentBg) {
        parts.push('  <rect width="100%" height="100%" fill="' + options.bgColor + '"/>');
      }

      for (var row = 0; row < moduleCount; row++) {
        for (var col = 0; col < moduleCount; col++) {
          if (matrix[row][col]) {
            var x = ((col + quietZone) * cellSize).toFixed(2);
            var y = ((row + quietZone) * cellSize).toFixed(2);
            var w = cellSize.toFixed(2);
            parts.push('  <rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + w + '" fill="' + options.fillColor + '"' + rx + '/>');
          }
        }
      }

      parts.push('</svg>');
      return parts.join('\n');
    }

    //
    //------- Export Functions -------//
    //

    function downloadPNG(canvas, size) {
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'qr-code-' + size + 'px.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function downloadSVG(svgString, size) {
      var blob = new Blob([svgString], { type: 'image/svg+xml' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'qr-code-' + size + 'px.svg';
      a.click();
      URL.revokeObjectURL(url);
    }

    //
    //------- UI -------//
    //

    var FORMAT_BUTTONS = null;
    var EC_BUTTONS = null;
    var _debounceTimer = null;

    function getActiveFormat() {
      var active = document.querySelector('#format-selector .segmented-control-btn.is-active');
      return active ? active.getAttribute('data-format') : 'png';
    }

    function getActiveEC() {
      var active = document.querySelector('#ec-selector .segmented-control-btn.is-active');
      return active ? active.getAttribute('data-ec') : 'H';
    }

    function getOptions() {
      var size = clamp(parseInt(document.getElementById('qr-size').value, 10) || 512, 128, 2048);
      var radiusPercent = parseInt(document.getElementById('qr-radius').value, 10) || 0;
      var quietZone = parseInt(document.getElementById('qr-quiet-zone').value, 10) || 0;
      var transparent = document.getElementById('qr-transparent').checked;

      var fillHex = normaliseHex(document.getElementById('qr-fill-text').value);
      var bgHex = normaliseHex(document.getElementById('qr-bg-text').value);

      if (!isValidHex(fillHex)) fillHex = '#000000';
      if (!isValidHex(bgHex)) bgHex = '#FFFFFF';

      return {
        size: size,
        moduleRadius: radiusPercent / 100,
        quietZone: quietZone,
        fillColor: fillHex,
        bgColor: bgHex,
        transparentBg: transparent
      };
    }

    function setDownloadEnabled(enabled) {
      document.getElementById('btn-download').disabled = !enabled;
      document.getElementById('btn-download-main').disabled = !enabled;
    }

    function showError(msg) {
      var el = document.getElementById('qr-error');
      if (msg) {
        el.textContent = msg;
        el.classList.add('is-visible');
      } else {
        el.textContent = '';
        el.classList.remove('is-visible');
      }
    }

    function updatePreview() {
      var input = document.getElementById('qr-input').value.trim();
      var canvas = document.getElementById('qr-canvas');
      var dimsLabel = document.getElementById('qr-dims-label');
      var options = getOptions();

      if (!input) {
        var ctx = canvas.getContext('2d');
        canvas.width = options.size;
        canvas.height = options.size;
        ctx.clearRect(0, 0, options.size, options.size);
        if (!options.transparentBg) {
          ctx.fillStyle = options.bgColor;
          ctx.fillRect(0, 0, options.size, options.size);
        }
        setDownloadEnabled(false);
        showError(null);
        dimsLabel.innerHTML = options.size + ' &times; ' + options.size + ' px';
        return;
      }

      try {
        var result = generateQRMatrix(input, getActiveEC());
        renderToCanvas(canvas, result.matrix, result.moduleCount, options);
        setDownloadEnabled(true);
        showError(null);
        dimsLabel.innerHTML = options.size + ' &times; ' + options.size + ' px';
      } catch (e) {
        var ctx2 = canvas.getContext('2d');
        canvas.width = options.size;
        canvas.height = options.size;
        ctx2.clearRect(0, 0, options.size, options.size);
        setDownloadEnabled(false);
        showError('Text too long for this error correction level. Try a lower level or shorter text.');
      }
    }

    function scheduleUpdate() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(updatePreview, 150);
    }

    function handleDownload() {
      var input = document.getElementById('qr-input').value.trim();
      if (!input || !_currentMatrix) return;

      var options = getOptions();
      var format = getActiveFormat();

      if (format === 'svg') {
        var svgString = generateSVGString(_currentMatrix, _currentModuleCount, options);
        downloadSVG(svgString, options.size);
      } else {
        downloadPNG(document.getElementById('qr-canvas'), options.size);
      }
    }

    function handleCopySVG() {
      var input = document.getElementById('qr-input').value.trim();
      if (!input || !_currentMatrix) return;

      var options = getOptions();
      var svgString = generateSVGString(_currentMatrix, _currentModuleCount, options);
      var btn = document.getElementById('btn-copy-svg');

      navigator.clipboard.writeText(svgString).then(function() {
        btn.classList.add('is-copied');
        setTimeout(function() { btn.classList.remove('is-copied'); }, 2000);
      });
    }

    function handleFormatSwitch(btn) {
      FORMAT_BUTTONS.forEach(function(b) { b.classList.remove('is-active'); });
      btn.classList.add('is-active');

      var format = btn.getAttribute('data-format');
      var copySvgBtn = document.getElementById('btn-copy-svg');
      copySvgBtn.style.display = format === 'svg' ? '' : 'none';
    }

    function handleECSwitch(btn) {
      EC_BUTTONS.forEach(function(b) { b.classList.remove('is-active'); });
      btn.classList.add('is-active');
      scheduleUpdate();
    }

    function syncColorFromPicker(pickerId, textId) {
      var picker = document.getElementById(pickerId);
      var text = document.getElementById(textId);
      text.value = picker.value.toUpperCase();
      scheduleUpdate();
    }

    function syncColorFromText(textId, pickerId) {
      var text = document.getElementById(textId);
      var picker = document.getElementById(pickerId);
      var hex = normaliseHex(text.value);
      if (isValidHex(hex)) {
        picker.value = hex;
        scheduleUpdate();
      }
    }

    //
    //------- Init -------//
    //

    document.addEventListener('DOMContentLoaded', function() {
      FORMAT_BUTTONS = document.querySelectorAll('#format-selector .segmented-control-btn');
      EC_BUTTONS = document.querySelectorAll('#ec-selector .segmented-control-btn');

      // Format segmented control
      FORMAT_BUTTONS.forEach(function(btn) {
        btn.addEventListener('click', function() { handleFormatSwitch(btn); });
      });

      // Error correction segmented control
      EC_BUTTONS.forEach(function(btn) {
        btn.addEventListener('click', function() { handleECSwitch(btn); });
      });

      // Text input
      document.getElementById('qr-input').addEventListener('input', scheduleUpdate);

      // Size input
      document.getElementById('qr-size').addEventListener('input', scheduleUpdate);

      // Module radius slider
      document.getElementById('qr-radius').addEventListener('input', function() {
        document.getElementById('qr-radius-value').textContent = this.value + '%';
        scheduleUpdate();
      });

      // Quiet zone slider
      document.getElementById('qr-quiet-zone').addEventListener('input', function() {
        document.getElementById('qr-quiet-zone-value').textContent = this.value;
        scheduleUpdate();
      });

      // Fill color
      document.getElementById('qr-fill-picker').addEventListener('input', function() {
        syncColorFromPicker('qr-fill-picker', 'qr-fill-text');
      });
      document.getElementById('qr-fill-text').addEventListener('change', function() {
        syncColorFromText('qr-fill-text', 'qr-fill-picker');
      });

      // Background color
      document.getElementById('qr-bg-picker').addEventListener('input', function() {
        syncColorFromPicker('qr-bg-picker', 'qr-bg-text');
      });
      document.getElementById('qr-bg-text').addEventListener('change', function() {
        syncColorFromText('qr-bg-text', 'qr-bg-picker');
      });

      // Transparent toggle
      document.getElementById('qr-transparent').addEventListener('change', function() {
        var controls = document.getElementById('qr-bg-controls');
        var frame = document.getElementById('qr-preview-frame');
        if (this.checked) {
          controls.classList.add('is-disabled');
          frame.classList.add('is-transparent');
        } else {
          controls.classList.remove('is-disabled');
          frame.classList.remove('is-transparent');
        }
        scheduleUpdate();
      });

      // Download buttons (both sticky bar and main)
      document.getElementById('btn-download').addEventListener('click', handleDownload);
      document.getElementById('btn-download-main').addEventListener('click', handleDownload);

      // Copy SVG button
      document.getElementById('btn-copy-svg').addEventListener('click', handleCopySVG);

      // Initial render
      updatePreview();
    });
  </script>

      <div class="icn-svg"><svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 4V2H20V4H4Z" fill="currentColor"/>
        <path d="M11 22V12.2392C11 11.3483 9.92286 10.9021 9.29289 11.5321L5.4 15.425L4 14L12 6L20 14L18.6 15.425L14.7071 11.5321C14.0771 10.9021 13 11.3483 13 12.2392V22H11Z" fill="currentColor"/>
      </svg></div>
    </button>
  </div>

    (function() {
      var btn = document.querySelector('.back-to-top-wrapper');
      if (!btn) return;
      window.addEventListener('scroll', function() { btn.classList.toggle('is-visible', window.scrollY > 300); });
      btn.querySelector('button').addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
    })();
