  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bydefault.studio/page/" />
  <meta property="og:title" content="Page Title - By Default BrandOS" />
  <meta property="og:description" content="A concise, compelling description of the page." />
  <meta property="og:image" content="https://bydefault.studio/assets/images/og/og-default.jpg" />
  <meta property="og:image:width" content="1200" />

  <meta property="og:site_name" content="By Default BrandOS" />
  <meta property="og:locale" content="en_US" />
  
  <!-- X (formerly Twitter) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://bydefault.studio/page/" />
  <meta name="twitter:title" content="Page Title - By Default BrandOS" />
  <meta name="twitter:description" content="A concise, compelling description of the page." />
  <meta name="twitter:image" content="https://bydefault.studio/assets/images/og/og-default.jpg" />
  <meta name="twitter:image:alt" content="Descriptive alt text for the image" />
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#3485cd" />
  
  <!-- Favicons -->
  <link rel="icon" href="../assets/icons/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  
  <!-- Design System Framework -->
  <link rel="stylesheet" href="../assets/css/design-system.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Client Theme Override (must load last to override base styles) -->
  <!-- <link rel="stylesheet" href="theme.css" /> -->

  <!-- Early theme loader: apply cached client theme before first paint -->
  <script>
  (function(){try{if(document.documentElement.getAttribute('data-client-theme'))return;var c=localStorage.getItem('bdd-client-theme');if(!c)return;var p=c.split('|'),k=p[0],css=p[1],fonts=p[2];if(!k||!css)return;var b='../';var l=document.createElement('link');l.id='client-theme-css';l.rel='stylesheet';l.href=b+css;document.head.appendChild(l);document.documentElement.setAttribute('data-client-theme',k);if(fonts){var pc=document.createElement('link');pc.rel='preconnect';pc.href='https://fonts.googleapis.com';pc.id='client-theme-fonts-preconnect';document.head.appendChild(pc);var pc2=document.createElement('link');pc2.rel='preconnect';pc2.href='https://fonts.gstatic.com';pc2.crossOrigin='anonymous';pc2.id='client-theme-fonts-preconnect2';document.head.appendChild(pc2);var fl=document.createElement('link');fl.id='client-theme-fonts';fl.rel='stylesheet';fl.href=fonts;document.head.appendChild(fl)}}catch(e){}})();
  </script>

  <!-- GoTrue JS — Netlify Identity API client (skipped on localhost) -->
  <script>
    window._gotrueReady = (function() {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0') {
        return Promise.resolve(null);
      }
      return import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm')
        .then(function(m) { var G = m.default && m.default.default ? m.default.default : m.default; window.GoTrue = G; return G; })
        .catch(function(e) { console.error('[Auth] GoTrue load failed:', e); return null; });
    })();
  </script>
</head>
<body class="auth-loading" data-access="team">

  <div class="page-wrapper">
    <div class="page-content">
      <section>
        <div class="padding-global">
          <div class="container-medium">
            <div class="block">
              <h1>Page Title</h1>
              <p>Content</p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Page Feedback -->
    <section class="page-feedback" aria-label="Page feedback">
      <div class="page-feedback-inner padding-global">
        <h3 class="page-feedback-prompt">Was this page helpful?</h3>
        <p class="page-feedback-description">We use this feedback to improve our documentation.</p>
        <div class="button-group">
          <button class="button is-small" data-feedback="yes" type="button">Yes</button>
          <button class="button is-small is-outline is-faded" data-feedback="no" type="button">No</button>
        </div>
      </div>
    </section>

    <!-- Feedback Modal -->
    <dialog class="feedback-modal" aria-label="Send feedback">
      <div class="feedback-modal-content">
        <h3 class="feedback-modal-title">Send feedback</h3>
        <p class="feedback-modal-subtitle"></p>
        <form class="feedback-form" name="page-feedback" data-netlify="true">
          <input type="hidden" name="form-name" value="page-feedback">
          <input type="hidden" name="sentiment" value="">
          <input type="hidden" name="page" value="">
          <textarea name="feedback" class="feedback-textarea" placeholder="Share your feedback here" rows="4"></textarea>
          <div class="button-group feedback-modal-actions">
            <button type="button" class="button is-small is-faded feedback-modal-close">Close</button>
            <button type="submit" class="button is-small">Send feedback</button>
          </div>
        </form>
      </div>
    </dialog>

    <!-- Footer -->
    <footer class="docs-footer">
      <div class="docs-footer-inner padding-global">
        <p class="docs-footer-text">&copy; 2026 By Default BrandOS</p>
      </div>
    </footer>

  </div>

  <!-- Site Navigation -->
  <script src="../assets/js/nav.js"></script>
  <!-- Auth -->
  <script src="../assets/js/auth-config.js"></script>
  <!-- Theme -->
  <script src="../assets/js/theme-config.js"></script>
  <script src="../assets/js/theme-loader.js"></script>
  <!-- Auth (must load after theme scripts) -->
  <script src="../assets/js/auth.js"></script>
  <!-- Feedback -->
  <script src="../assets/js/feedback.js"></script>

</body>
</html>
